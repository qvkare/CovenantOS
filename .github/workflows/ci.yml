name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build -w @covenantos/shared
      - run: npm run lint -w @covenantos/shared
      - run: npm run lint -w @covenantos/backend
      - run: npm run lint -w @covenantos/provider
      - run: npm run typecheck -w @covenantos/web
      - run: npm run test -w @covenantos/backend

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-01-01
          targets: wasm32-unknown-unknown
      - name: Install cargo-odra
        run: cargo install cargo-odra --locked
      - name: Run Odra tests
        working-directory: contracts
        run: cargo odra test

  docker:
    runs-on: ubuntu-latest
    env:
      X402_PAYEE_ACCOUNT_HASH: "533109d2891f6c3a293be1bc88ad38965301dd8211b455e7850d1fc2268bce83"
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
